<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - Lets Learn it</title>
</head>
<body>
    <div>
        <!-- username -->
        <label for="username">Enter your Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username">
    </div>
        
    <div>
        <!-- password -->
        <label for="password">Enter your Pasword</label>
        <input type="password" id="password" name="password" placeholder="Enter your password">
    </div>
    
    <div>
        <!-- radio button -->
        <input type="radio" name="gender" id="male">
        <label for="male">Male</label>
        <input type="radio" name="gender" id="female">
        <label for="female">Female</label>
    </div>

    <div>
        <!-- Checkbox -->
        <input type="checkbox" id="subscribe" name="subscribe" value="yes">
        <label for="subscribe">Subscribe to newsletter</label>
    </div>

    <div>
        <!-- Text Area -->
         <textarea name="comment" id="comment", rows="4" cols="20">Enter Your comment</textarea>
    </div>
    <div>
        <!-- select element in forms -->
         <select name="fruits" id="select_fruits">
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="cherry">Cherry</option>
         </select>
    </div>
</body>
</html>
